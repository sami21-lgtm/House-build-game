<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF-8" >
    <meta name = "viewport" content = "width = device-width, intital-scale = 1.0">
    <title>House Build Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2>Day 59/100 Part 01</h2>
            <h1 class="game-title">House Build Game</h1>
        </div>

        <div class="stage" id="gameStage">
            <div class="moon"></div>
            
            <div class="house-container" id="houseContainer">
                <div class="ground-grass"></div>
            </div>

            <div class="water-reflection">
                <div class="reflected-house" id="reflectedHouse"></div>
            </div>
        </div>

        <div class="controls">
            <button id="buildBtn" class="build-btn">🏗️ Add Next Floor</button>
            <button id="resetBtn" class="reset-btn">🔄 Reset Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
  </head>
